name: Build Wordsmith

on:
  pull_request:
    types:
      - labeled

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [web, words, db]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name : Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build, Tag and Push
        run : |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/wordsmith:${{ matrix.service }}-latest \
            -t ${{ secrets.DOCKER_USERNAME }}/wordsmith:${{ matrix.service }}-v1.0.0 \
            -t ${{ secrets.DOCKER_USERNAME }}/wordsmith:${{ matrix.service }}-${{ github.sha }} \
            ./${{ matrix.service }}
            
          docker push ${{ secrets.DOCKER_USERNAME }}/wordsmith:${{ matrix.service }}-latest
          docker push ${{ secrets.DOCKER_USERNAME }}/wordsmith:${{ matrix.service }}-v1.0.0
          docker push ${{ secrets.DOCKER_USERNAME }}/wordsmith:${{ matrix.service }}-${{ github.sha }}
