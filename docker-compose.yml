version: '3.8'

services:
  db:
    build: ./db
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      ports: "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  words:
    build: ./words
    ports:
    - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres

  web:
    build: ./web
    volumes:
      - ./web/static:/app/static
    depends_on:
      - words
    ports:
      - "8081:80"

